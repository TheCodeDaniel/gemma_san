<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Arial,sans-serif">
  <!-- Space -->
  <rect width="400" height="300" fill="#0A1628"/>
  <!-- Stars -->
  <circle cx="22" cy="28" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="88" cy="14" r="1"   fill="white" opacity="0.5"/>
  <circle cx="195" cy="22" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="290" cy="9"  r="1"   fill="white" opacity="0.6"/>
  <circle cx="368" cy="38" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="55"  cy="268" r="1"  fill="white" opacity="0.5"/>
  <circle cx="155" cy="282" r="1.5" fill="white" opacity="0.7"/>
  <circle cx="248" cy="274" r="1"  fill="white" opacity="0.6"/>
  <circle cx="345" cy="266" r="1.5" fill="white" opacity="0.8"/>
  <circle cx="120" cy="42" r="1"   fill="white" opacity="0.5"/>
  <!-- Orbital plane (dashed) -->
  <line x1="68" y1="165" x2="395" y2="165" stroke="white" stroke-width="1" stroke-dasharray="4,8" opacity="0.25"/>
  <!-- Sun glow -->
  <circle cx="35" cy="165" r="50" fill="#FFBF46" opacity="0.12"/>
  <!-- Sun -->
  <circle cx="35" cy="165" r="34" fill="#FFBF46"/>
  <!-- Mercury -->
  <circle cx="108" cy="165" r="7" fill="#9E9E9E"/>
  <!-- Venus -->
  <circle cx="166" cy="165" r="10" fill="#FF8C42"/>
  <!-- Earth -->
  <circle cx="228" cy="165" r="12" fill="#2EC4B6"/>
  <ellipse cx="222" cy="160" rx="5" ry="7" fill="#1A6A6A" opacity="0.45"/>
  <!-- Mars -->
  <circle cx="290" cy="165" r="9" fill="#E63946"/>
  <!-- Jupiter -->
  <circle cx="358" cy="165" r="22" fill="#C4A265"/>
  <ellipse cx="358" cy="158" rx="22" ry="5" fill="#A08040" opacity="0.6"/>
  <ellipse cx="358" cy="168" rx="22" ry="4" fill="#A08040" opacity="0.5"/>
  <ellipse cx="364" cy="170" rx="5" ry="3" fill="#E63946" opacity="0.7"/>
  <!-- Labels -->
  <text x="35"  y="210" fill="#FFBF46" font-size="10" text-anchor="middle" font-weight="bold">Sun</text>
  <text x="108" y="185" fill="#CCCCCC" font-size="9"  text-anchor="middle">Mercury</text>
  <text x="166" y="188" fill="#FF8C42" font-size="9"  text-anchor="middle">Venus</text>
  <text x="228" y="190" fill="#2EC4B6" font-size="9"  text-anchor="middle">Earth</text>
  <text x="290" y="187" fill="#E63946" font-size="9"  text-anchor="middle">Mars</text>
  <text x="358" y="200" fill="#C4A265" font-size="9"  text-anchor="middle">Jupiter</text>
  <!-- Title -->
  <text x="200" y="265" fill="white" font-size="12" text-anchor="middle" font-weight="bold" opacity="0.8">Solar System</text>
</svg>
