<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Arial,sans-serif">
  <!-- Background -->
  <rect width="400" height="300" fill="#F0FFF5"/>
  <!-- Title -->
  <text x="200" y="20" fill="#1A1A2E" font-size="13" font-weight="bold" text-anchor="middle">Plant Cell</text>

  <!-- ── CELL WALL (outermost, thick brown border) ── -->
  <rect x="28" y="32" width="320" height="228" rx="6" fill="#8B6914" stroke="#5C4015" stroke-width="2"/>

  <!-- ── CELL MEMBRANE (just inside wall) ── -->
  <rect x="38" y="42" width="300" height="208" rx="4" fill="#D4F5D4" stroke="#2EC4B6" stroke-width="2"/>

  <!-- ── CYTOPLASM (fill) ── -->
  <rect x="40" y="44" width="296" height="204" rx="3" fill="#E8FFE8"/>

  <!-- ── CENTRAL VACUOLE (large, left-center) ── -->
  <rect x="50" y="54" width="195" height="184" rx="10" fill="#2EC4B6" opacity="0.25" stroke="#2EC4B6" stroke-width="2"/>
  <text x="148" y="145" fill="#1A936F" font-size="10" font-weight="bold" text-anchor="middle">Central</text>
  <text x="148" y="158" fill="#1A936F" font-size="10" font-weight="bold" text-anchor="middle">vacuole</text>
  <text x="148" y="170" fill="#1A936F" font-size="8" text-anchor="middle">(stores water)</text>

  <!-- ── NUCLEUS (right side, purple) ── -->
  <circle cx="298" cy="148" r="45" fill="#6A4C93" opacity="0.85" stroke="#4A2C73" stroke-width="2"/>
  <!-- Nuclear envelope (double membrane) -->
  <circle cx="298" cy="148" r="45" fill="none" stroke="#8B6FC4" stroke-width="1.5" stroke-dasharray="5,3" opacity="0.5"/>
  <!-- Nucleolus -->
  <circle cx="293" cy="143" r="16" fill="#8B6FC4"/>

  <!-- ── CHLOROPLASTS (3, green ovals in cytoplasm) ── -->
  <!-- Chloroplast 1 (top-right of vacuole) -->
  <ellipse cx="272" cy="72" rx="22" ry="11" fill="#1A936F"/>
  <ellipse cx="272" cy="72" rx="14" ry="6" fill="#2EC4B6" opacity="0.5"/>
  <line x1="258" y1="72" x2="286" y2="72" stroke="#1A936F" stroke-width="1.5" opacity="0.7"/>

  <!-- Chloroplast 2 (right-bottom) -->
  <ellipse cx="255" cy="230" rx="22" ry="11" fill="#1A936F"/>
  <ellipse cx="255" cy="230" rx="14" ry="6" fill="#2EC4B6" opacity="0.5"/>
  <line x1="241" y1="230" x2="269" y2="230" stroke="#1A936F" stroke-width="1.5" opacity="0.7"/>

  <!-- Chloroplast 3 (above nucleus) -->
  <ellipse cx="310" cy="92" rx="20" ry="10" fill="#1A936F"/>
  <ellipse cx="310" cy="92" rx="12" ry="5" fill="#2EC4B6" opacity="0.5"/>

  <!-- ── LABELS with leader lines ── -->
  <!-- Cell wall label (top-left) -->
  <line x1="52" y1="38" x2="20" y2="25" stroke="#8B6914" stroke-width="1"/>
  <text x="5" y="22" fill="#8B6914" font-size="9" font-weight="bold">Cell wall</text>

  <!-- Cell membrane label (top) -->
  <line x1="200" y1="44" x2="200" y2="30" stroke="#2EC4B6" stroke-width="1"/>
  <text x="160" y="27" fill="#2EC4B6" font-size="9" font-weight="bold">Cell membrane</text>

  <!-- Nucleus label (bottom right) -->
  <line x1="298" y1="193" x2="298" y2="268" stroke="#6A4C93" stroke-width="1"/>
  <text x="258" y="280" fill="#6A4C93" font-size="9" font-weight="bold">Nucleus</text>

  <!-- Chloroplast label -->
  <line x1="272" y1="61" x2="290" y2="28" stroke="#1A936F" stroke-width="1"/>
  <text x="288" y="25" fill="#1A936F" font-size="9" font-weight="bold">Chloroplast</text>
  <text x="288" y="35" fill="#555" font-size="8">(makes food)</text>

  <!-- Vacuole label handled inline -->
</svg>
