<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Arial,sans-serif">
  <!-- Background -->
  <rect width="400" height="300" fill="#F0F8EE"/>

  <!-- Title -->
  <text x="200" y="22" fill="#1A1A2E" font-size="13" font-weight="bold" text-anchor="middle">Food Chain</text>

  <!-- === GRASS (x≈40) === -->
  <!-- Mound of grass blades -->
  <ellipse cx="55" cy="175" rx="32" ry="14" fill="#1A936F" opacity="0.3"/>
  <rect x="42" y="130" width="8" height="48" rx="4" fill="#1A936F" transform="rotate(-8,46,154)"/>
  <rect x="51" y="122" width="8" height="52" rx="4" fill="#2EC4B6" opacity="0.85"/>
  <rect x="61" y="127" width="8" height="47" rx="4" fill="#1A936F" transform="rotate(6,65,150)"/>
  <rect x="70" y="133" width="7" height="42" rx="4" fill="#1A936F" transform="rotate(10,74,154)"/>

  <!-- Grass label -->
  <text x="55" y="200" fill="#1A936F" font-size="10" font-weight="bold" text-anchor="middle">Grass</text>
  <text x="55" y="213" fill="#555" font-size="9" text-anchor="middle">Producer</text>

  <!-- Arrow 1: Grass → Grasshopper -->
  <line x1="91" y1="155" x2="118" y2="155" stroke="#FF6B35" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- === GRASSHOPPER (x≈145) === -->
  <!-- Body -->
  <ellipse cx="148" cy="155" rx="22" ry="11" fill="#FF8C42"/>
  <!-- Head -->
  <circle cx="169" cy="152" r="8" fill="#FF6B35"/>
  <!-- Eye -->
  <circle cx="172" cy="150" r="2" fill="white"/>
  <circle cx="172" cy="150" r="1" fill="#1A1A2E"/>
  <!-- Antennae -->
  <line x1="172" y1="145" x2="180" y2="133" stroke="#FF6B35" stroke-width="1.5"/>
  <line x1="170" y1="145" x2="176" y2="132" stroke="#FF6B35" stroke-width="1.5"/>
  <!-- Hind legs -->
  <line x1="140" y1="163" x2="128" y2="178" stroke="#FF8C42" stroke-width="2"/>
  <line x1="150" y1="165" x2="142" y2="180" stroke="#FF8C42" stroke-width="2"/>

  <text x="148" y="200" fill="#FF6B35" font-size="10" font-weight="bold" text-anchor="middle">Grasshopper</text>
  <text x="148" y="213" fill="#555" font-size="9" text-anchor="middle">1st Consumer</text>

  <!-- Arrow 2: Grasshopper → Frog -->
  <line x1="183" y1="155" x2="210" y2="155" stroke="#FF6B35" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- === FROG (x≈242) === -->
  <!-- Body -->
  <ellipse cx="242" cy="160" rx="22" ry="16" fill="#1A936F"/>
  <!-- Head -->
  <ellipse cx="242" cy="142" rx="18" ry="14" fill="#2EC4B6"/>
  <!-- Eyes -->
  <circle cx="232" cy="135" r="6" fill="#1A936F"/>
  <circle cx="252" cy="135" r="6" fill="#1A936F"/>
  <circle cx="232" cy="134" r="3" fill="white"/>
  <circle cx="252" cy="134" r="3" fill="white"/>
  <circle cx="232" cy="134" r="1.5" fill="#1A1A2E"/>
  <circle cx="252" cy="134" r="1.5" fill="#1A1A2E"/>
  <!-- Mouth line -->
  <path d="M233 148 Q242 153 251 148" fill="none" stroke="#1A936F" stroke-width="1.5"/>
  <!-- Front legs -->
  <line x1="222" y1="168" x2="210" y2="178" stroke="#1A936F" stroke-width="3"/>
  <line x1="262" y1="168" x2="274" y2="178" stroke="#1A936F" stroke-width="3"/>

  <text x="242" y="200" fill="#1A936F" font-size="10" font-weight="bold" text-anchor="middle">Frog</text>
  <text x="242" y="213" fill="#555" font-size="9" text-anchor="middle">2nd Consumer</text>

  <!-- Arrow 3: Frog → Eagle -->
  <line x1="273" y1="155" x2="300" y2="155" stroke="#FF6B35" stroke-width="2.5" marker-end="url(#arr)"/>

  <!-- === EAGLE (x≈345) === -->
  <!-- Wings (V shape) -->
  <path d="M305 155 Q325 135 345 150 Q365 135 385 155" fill="#5C4033" stroke="#3E2A1E" stroke-width="1"/>
  <!-- Body -->
  <ellipse cx="345" cy="160" rx="16" ry="12" fill="#6D4C41"/>
  <!-- Head -->
  <circle cx="345" cy="143" r="10" fill="#5C4033"/>
  <!-- White head cap -->
  <ellipse cx="345" cy="140" rx="7" ry="6" fill="#F5F5F5"/>
  <!-- Beak -->
  <path d="M352 143 L360 147 L352 149 Z" fill="#FFBF46"/>
  <!-- Eye -->
  <circle cx="350" cy="142" r="2.5" fill="#FFBF46"/>
  <circle cx="350" cy="142" r="1.2" fill="#1A1A2E"/>
  <!-- Tail feathers -->
  <path d="M332 170 Q345 178 358 170" fill="#5C4033"/>

  <text x="345" y="200" fill="#5C4033" font-size="10" font-weight="bold" text-anchor="middle">Eagle</text>
  <text x="345" y="213" fill="#555" font-size="9" text-anchor="middle">3rd Consumer</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#FF6B35"/>
    </marker>
  </defs>

  <!-- Energy label -->
  <text x="200" y="240" fill="#FF6B35" font-size="10" font-weight="bold" text-anchor="middle">Energy flows →</text>
</svg>
