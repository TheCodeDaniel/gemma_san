<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Arial,sans-serif">
  <defs>
    <marker id="ca" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0,8 3,0 6" fill="#6A4C93"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#F5F0FF"/>

  <!-- Title -->
  <text x="200" y="22" fill="#1A1A2E" font-size="13" font-weight="bold" text-anchor="middle">Life Cycle of a Butterfly</text>

  <!-- === EGG (top, cx=200, cy=65) === -->
  <ellipse cx="200" cy="68" rx="18" ry="22" fill="#FFBF46" stroke="#E0A020" stroke-width="1.5"/>
  <!-- Egg texture lines -->
  <ellipse cx="200" cy="68" rx="12" ry="16" fill="none" stroke="#E0A020" stroke-width="0.8" opacity="0.5"/>
  <text x="200" y="104" fill="#6A4C93" font-size="11" font-weight="bold" text-anchor="middle">Egg</text>

  <!-- === CATERPILLAR (right, cx=320, cy=158) === -->
  <!-- Segments -->
  <circle cx="338" cy="158" r="12" fill="#1A936F"/>
  <circle cx="320" cy="158" r="13" fill="#2EC4B6"/>
  <circle cx="302" cy="158" r="12" fill="#1A936F"/>
  <circle cx="285" cy="158" r="11" fill="#2EC4B6"/>
  <!-- Head -->
  <circle cx="355" cy="155" r="14" fill="#1A936F"/>
  <!-- Eyes -->
  <circle cx="360" cy="150" r="3" fill="white"/>
  <circle cx="360" cy="150" r="1.5" fill="#1A1A2E"/>
  <!-- Antennae -->
  <line x1="355" y1="142" x2="350" y2="130" stroke="#1A936F" stroke-width="1.5"/>
  <line x1="362" y1="141" x2="370" y2="130" stroke="#1A936F" stroke-width="1.5"/>
  <circle cx="350" cy="130" r="2.5" fill="#FF6B35"/>
  <circle cx="370" cy="130" r="2.5" fill="#FF6B35"/>
  <!-- Legs -->
  <line x1="320" y1="170" x2="320" y2="183" stroke="#1A936F" stroke-width="2"/>
  <line x1="302" y1="169" x2="302" y2="182" stroke="#1A936F" stroke-width="2"/>
  <line x1="285" y1="168" x2="285" y2="181" stroke="#1A936F" stroke-width="2"/>
  <text x="323" y="200" fill="#1A936F" font-size="11" font-weight="bold" text-anchor="middle">Caterpillar</text>

  <!-- === CHRYSALIS (bottom, cx=200, cy=238) === -->
  <ellipse cx="200" cy="240" rx="16" ry="28" fill="#6A4C93" opacity="0.85"/>
  <ellipse cx="200" cy="225" rx="8" ry="6" fill="#8B6FC4"/>
  <!-- Hanging thread -->
  <line x1="200" y1="212" x2="200" y2="200" stroke="#6A4C93" stroke-width="2"/>
  <!-- Branch -->
  <line x1="170" y1="200" x2="230" y2="200" stroke="#5C4033" stroke-width="3"/>
  <!-- Lines on chrysalis -->
  <line x1="190" y1="230" x2="210" y2="230" stroke="#8B6FC4" stroke-width="1" opacity="0.6"/>
  <line x1="188" y1="240" x2="212" y2="240" stroke="#8B6FC4" stroke-width="1" opacity="0.6"/>
  <line x1="191" y1="250" x2="209" y2="250" stroke="#8B6FC4" stroke-width="1" opacity="0.6"/>
  <text x="200" y="278" fill="#6A4C93" font-size="11" font-weight="bold" text-anchor="middle">Chrysalis</text>

  <!-- === BUTTERFLY (left, cx=80, cy=158) === -->
  <!-- Upper wings -->
  <path d="M80 155 C55 130 30 125 25 148 C20 165 50 175 80 158 Z" fill="#FF6B35" opacity="0.9"/>
  <path d="M80 155 C105 130 130 125 135 148 C140 165 110 175 80 158 Z" fill="#FF6B35" opacity="0.9"/>
  <!-- Lower wings -->
  <path d="M80 162 C55 168 32 175 30 192 C28 207 55 210 80 165 Z" fill="#FFBF46" opacity="0.9"/>
  <path d="M80 162 C105 168 128 175 130 192 C132 207 105 210 80 165 Z" fill="#FFBF46" opacity="0.9"/>
  <!-- Wing spots -->
  <circle cx="60" cy="150" r="5" fill="#1A1A2E" opacity="0.4"/>
  <circle cx="100" cy="150" r="5" fill="#1A1A2E" opacity="0.4"/>
  <!-- Body -->
  <ellipse cx="80" cy="160" rx="5" ry="18" fill="#1A1A2E"/>
  <!-- Antennae -->
  <line x1="77" y1="143" x2="65" y2="128" stroke="#1A1A2E" stroke-width="1.5"/>
  <line x1="83" y1="143" x2="95" y2="128" stroke="#1A1A2E" stroke-width="1.5"/>
  <circle cx="65" cy="128" r="2.5" fill="#1A1A2E"/>
  <circle cx="95" cy="128" r="2.5" fill="#1A1A2E"/>
  <text x="80" y="200" fill="#FF6B35" font-size="11" font-weight="bold" text-anchor="middle">Butterfly</text>

  <!-- Curved arrows (clockwise): Egg→Caterpillar, Caterpillar→Chrysalis, Chrysalis→Butterfly, Butterfly→Egg -->
  <!-- Egg → Caterpillar (top → right) -->
  <path d="M218 75 Q290 90 295 138" fill="none" stroke="#6A4C93" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ca)"/>
  <!-- Caterpillar → Chrysalis (right → bottom) -->
  <path d="M295 175 Q295 230 218 242" fill="none" stroke="#6A4C93" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ca)"/>
  <!-- Chrysalis → Butterfly (bottom → left) -->
  <path d="M182 242 Q110 235 100 178" fill="none" stroke="#6A4C93" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ca)"/>
  <!-- Butterfly → Egg (left → top) -->
  <path d="M100 138 Q110 78 182 70" fill="none" stroke="#6A4C93" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#ca)"/>
</svg>
