<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Arial,sans-serif">
  <!-- Background (sky blue) -->
  <rect width="400" height="300" fill="#C8E8F8"/>

  <!-- Title -->
  <text x="200" y="22" fill="#1A1A2E" font-size="13" font-weight="bold" text-anchor="middle">Types of Weather</text>

  <!-- Grid dividers (subtle) -->
  <line x1="200" y1="30" x2="200" y2="280" stroke="white" stroke-width="1.5" opacity="0.6"/>
  <line x1="10" y1="158" x2="390" y2="158" stroke="white" stroke-width="1.5" opacity="0.6"/>

  <!-- ══════ TOP-LEFT: Sunny ══════ -->
  <rect x="0" y="30" width="200" height="128" rx="8" fill="#FFFBE8" opacity="0.5"/>
  <!-- Sun glow -->
  <circle cx="100" cy="92" r="32" fill="#FFBF46" opacity="0.2"/>
  <!-- Sun body -->
  <circle cx="100" cy="92" r="25" fill="#FFBF46"/>
  <!-- Sun rays -->
  <line x1="100" y1="58" x2="100" y2="50" stroke="#FFBF46" stroke-width="4" stroke-linecap="round"/>
  <line x1="124" y1="66" x2="130" y2="60" stroke="#FFBF46" stroke-width="4" stroke-linecap="round"/>
  <line x1="134" y1="91" x2="142" y2="91" stroke="#FFBF46" stroke-width="4" stroke-linecap="round"/>
  <line x1="124" y1="118" x2="130" y2="124" stroke="#FFBF46" stroke-width="4" stroke-linecap="round"/>
  <line x1="100" y1="126" x2="100" y2="134" stroke="#FFBF46" stroke-width="4" stroke-linecap="round"/>
  <line x1="76" y1="118" x2="70" y2="124" stroke="#FFBF46" stroke-width="4" stroke-linecap="round"/>
  <line x1="66" y1="91" x2="58" y2="91" stroke="#FFBF46" stroke-width="4" stroke-linecap="round"/>
  <line x1="76" y1="66" x2="70" y2="60" stroke="#FFBF46" stroke-width="4" stroke-linecap="round"/>
  <text x="100" y="148" fill="#E0A020" font-size="11" font-weight="bold" text-anchor="middle">Sunny</text>

  <!-- ══════ TOP-RIGHT: Cloudy ══════ -->
  <rect x="200" y="30" width="200" height="128" rx="8" fill="#EEF4F8" opacity="0.5"/>
  <!-- Cloud (4 overlapping ellipses) -->
  <ellipse cx="300" cy="88" rx="52" ry="28" fill="#9CB4CC"/>
  <ellipse cx="268" cy="100" rx="32" ry="24" fill="#9CB4CC"/>
  <ellipse cx="334" cy="100" rx="30" ry="22" fill="#9CB4CC"/>
  <ellipse cx="300" cy="108" rx="50" ry="20" fill="#9CB4CC"/>
  <!-- Cloud highlight -->
  <ellipse cx="288" cy="78" rx="24" ry="14" fill="#B8CDE0" opacity="0.5"/>
  <text x="300" y="148" fill="#6A8CA8" font-size="11" font-weight="bold" text-anchor="middle">Cloudy</text>

  <!-- ══════ BOTTOM-LEFT: Rainy ══════ -->
  <rect x="0" y="158" width="200" height="132" rx="8" fill="#E0EEF8" opacity="0.5"/>
  <!-- Rain cloud (same shape, darker) -->
  <ellipse cx="100" cy="194" rx="50" ry="26" fill="#6A8CA8"/>
  <ellipse cx="72" cy="205" rx="30" ry="22" fill="#6A8CA8"/>
  <ellipse cx="130" cy="204" rx="28" ry="20" fill="#6A8CA8"/>
  <ellipse cx="100" cy="212" rx="48" ry="18" fill="#6A8CA8"/>
  <!-- Rain drops (falling ellipses) -->
  <ellipse cx="72" cy="238" rx="4" ry="9" fill="#2EC4B6"/>
  <ellipse cx="88" cy="248" rx="4" ry="9" fill="#2EC4B6"/>
  <ellipse cx="104" cy="238" rx="4" ry="9" fill="#2EC4B6"/>
  <ellipse cx="120" cy="248" rx="4" ry="9" fill="#2EC4B6"/>
  <ellipse cx="80" cy="264" rx="3" ry="7" fill="#2EC4B6" opacity="0.65"/>
  <ellipse cx="112" cy="262" rx="3" ry="7" fill="#2EC4B6" opacity="0.65"/>
  <text x="100" y="285" fill="#2EC4B6" font-size="11" font-weight="bold" text-anchor="middle">Rainy</text>

  <!-- ══════ BOTTOM-RIGHT: Stormy ══════ -->
  <rect x="200" y="158" width="200" height="132" rx="8" fill="#1A2840" opacity="0.25"/>
  <!-- Dark storm cloud -->
  <ellipse cx="300" cy="194" rx="55" ry="28" fill="#3D5068"/>
  <ellipse cx="268" cy="206" rx="34" ry="24" fill="#3D5068"/>
  <ellipse cx="334" cy="205" rx="32" ry="22" fill="#3D5068"/>
  <ellipse cx="300" cy="214" rx="52" ry="20" fill="#3D5068"/>
  <!-- Lightning bolt -->
  <path d="M308 232 L296 256 L305 256 L292 280 L317 250 L306 250 Z" fill="#FFBF46"/>
  <!-- Rain lines -->
  <line x1="262" y1="236" x2="258" y2="268" stroke="#9CB4CC" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <line x1="338" y1="232" x2="334" y2="268" stroke="#9CB4CC" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  <text x="300" y="292" fill="#3D5068" font-size="11" font-weight="bold" text-anchor="middle">Stormy</text>
</svg>
