<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Arial,sans-serif">
  <!-- Background (sky blue — air theme) -->
  <rect width="400" height="300" fill="#E8F8FF"/>
  <!-- Title -->
  <text x="200" y="22" fill="#1A1A2E" font-size="13" font-weight="bold" text-anchor="middle">Lungs</text>

  <!-- Trachea (windpipe) -->
  <rect x="192" y="20" width="16" height="75" rx="8" fill="#9CB4CC"/>
  <!-- Tracheal rings (subtle) -->
  <line x1="192" y1="35" x2="208" y2="35" stroke="#7A9AB8" stroke-width="2" opacity="0.5"/>
  <line x1="192" y1="47" x2="208" y2="47" stroke="#7A9AB8" stroke-width="2" opacity="0.5"/>
  <line x1="192" y1="59" x2="208" y2="59" stroke="#7A9AB8" stroke-width="2" opacity="0.5"/>
  <line x1="192" y1="71" x2="208" y2="71" stroke="#7A9AB8" stroke-width="2" opacity="0.5"/>
  <text x="216" y="55" fill="#9CB4CC" font-size="10" font-weight="bold">Trachea</text>

  <!-- Left bronchus -->
  <path d="M192 95 C180 108 158 118 135 122" fill="none" stroke="#9CB4CC" stroke-width="11" stroke-linecap="round"/>
  <!-- Right bronchus -->
  <path d="M208 95 C222 108 248 118 272 122" fill="none" stroke="#9CB4CC" stroke-width="11" stroke-linecap="round"/>
  <text x="170" y="148" fill="#7A9AB8" font-size="9" font-weight="bold" text-anchor="middle">Bronchi</text>

  <!-- LEFT LUNG (slightly smaller, with cardiac notch on right side) -->
  <path d="M118 75
    C55 78 32 115 32 175
    C32 235 68 272 112 274
    C144 276 173 260 183 238
    C190 220 188 195 185 162
    C178 122 168 88 118 75 Z"
    fill="#FF8C42" opacity="0.88"/>
  <!-- Lobe division line (left lung has 2 lobes) -->
  <path d="M58 158 Q107 145 178 165" fill="none" stroke="#E07030" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- RIGHT LUNG (3 lobes, slightly larger, no cardiac notch) -->
  <path d="M282 72
    C345 75 372 112 372 172
    C372 232 340 270 300 274
    C268 276 238 260 227 238
    C218 218 218 178 222 138
    C228 98 240 78 282 72 Z"
    fill="#FF8C42" opacity="0.88"/>
  <!-- Two lobe division lines (right lung has 3 lobes) -->
  <path d="M228 148 Q260 138 335 152" fill="none" stroke="#E07030" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>
  <path d="M232 198 Q268 188 352 202" fill="none" stroke="#E07030" stroke-width="1.5" stroke-dasharray="4,3" opacity="0.6"/>

  <!-- Bronchioles inside left lung -->
  <line x1="118" y1="130" x2="88" y2="158" stroke="#9CB4CC" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <line x1="118" y1="130" x2="108" y2="168" stroke="#9CB4CC" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <line x1="118" y1="130" x2="75" y2="178" stroke="#9CB4CC" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="118" y1="130" x2="122" y2="185" stroke="#9CB4CC" stroke-width="3" stroke-linecap="round" opacity="0.45"/>

  <!-- Bronchioles inside right lung -->
  <line x1="278" y1="128" x2="308" y2="156" stroke="#9CB4CC" stroke-width="5" stroke-linecap="round" opacity="0.55"/>
  <line x1="278" y1="128" x2="288" y2="172" stroke="#9CB4CC" stroke-width="4" stroke-linecap="round" opacity="0.55"/>
  <line x1="278" y1="128" x2="330" y2="172" stroke="#9CB4CC" stroke-width="3" stroke-linecap="round" opacity="0.45"/>
  <line x1="278" y1="128" x2="282" y2="185" stroke="#9CB4CC" stroke-width="3" stroke-linecap="round" opacity="0.45"/>

  <!-- Heart space (cardiac notch indicator between lungs) -->
  <ellipse cx="200" cy="195" rx="25" ry="32" fill="#E8F8FF" opacity="0.7"/>
  <text x="200" y="215" fill="#E07030" font-size="8" text-anchor="middle" opacity="0.7">Heart</text>
  <text x="200" y="226" fill="#E07030" font-size="8" text-anchor="middle" opacity="0.7">space</text>

  <!-- Diaphragm -->
  <path d="M15 282 Q200 296 385 282" fill="none" stroke="#1A936F" stroke-width="4" stroke-linecap="round"/>
  <text x="200" y="298" fill="#1A936F" font-size="10" font-weight="bold" text-anchor="middle">Diaphragm</text>

  <!-- Lung labels -->
  <text x="88" y="190" fill="#1A1A2E" font-size="10" font-weight="bold" text-anchor="middle">Left</text>
  <text x="88" y="202" fill="#1A1A2E" font-size="10" font-weight="bold" text-anchor="middle">lung</text>

  <text x="318" y="190" fill="#1A1A2E" font-size="10" font-weight="bold" text-anchor="middle">Right</text>
  <text x="318" y="202" fill="#1A1A2E" font-size="10" font-weight="bold" text-anchor="middle">lung</text>
</svg>
