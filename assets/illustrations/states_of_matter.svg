<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Arial,sans-serif">
  <!-- Background -->
  <rect width="400" height="300" fill="#F8F5FF"/>

  <!-- Title -->
  <text x="200" y="22" fill="#1A1A2E" font-size="13" font-weight="bold" text-anchor="middle">States of Matter</text>

  <!-- ── Panel dividers ── -->
  <line x1="133" y1="35" x2="133" y2="272" stroke="#CCCCCC" stroke-width="1"/>
  <line x1="267" y1="35" x2="267" y2="272" stroke="#CCCCCC" stroke-width="1"/>

  <!-- ════════ SOLID (left panel, cx≈66) ════════ -->
  <rect x="2" y="35" width="131" height="237" rx="8" fill="#EDE7F6" opacity="0.5"/>
  <text x="66" y="55" fill="#6A4C93" font-size="12" font-weight="bold" text-anchor="middle">Solid</text>

  <!-- 3×3 tight grid of purple dots (centered on 66,145) -->
  <!-- Row 1 -->
  <circle cx="42" cy="105" r="12" fill="#6A4C93"/>
  <circle cx="66" cy="105" r="12" fill="#6A4C93"/>
  <circle cx="90" cy="105" r="12" fill="#6A4C93"/>
  <!-- Row 2 -->
  <circle cx="42" cy="132" r="12" fill="#6A4C93"/>
  <circle cx="66" cy="132" r="12" fill="#6A4C93"/>
  <circle cx="90" cy="132" r="12" fill="#6A4C93"/>
  <!-- Row 3 -->
  <circle cx="42" cy="159" r="12" fill="#6A4C93"/>
  <circle cx="66" cy="159" r="12" fill="#6A4C93"/>
  <circle cx="90" cy="159" r="12" fill="#6A4C93"/>

  <!-- Vibration arrows (tiny) -->
  <line x1="42" y1="95" x2="42" y2="98" stroke="#8B6FC4" stroke-width="1.5"/>
  <line x1="66" y1="95" x2="66" y2="98" stroke="#8B6FC4" stroke-width="1.5"/>
  <line x1="90" y1="95" x2="90" y2="98" stroke="#8B6FC4" stroke-width="1.5"/>

  <text x="66" y="192" fill="#6A4C93" font-size="10" font-weight="bold" text-anchor="middle">Tightly packed</text>
  <text x="66" y="207" fill="#555" font-size="9" text-anchor="middle">Fixed shape</text>
  <text x="66" y="220" fill="#555" font-size="9" text-anchor="middle">&amp; volume</text>

  <!-- ════════ LIQUID (middle panel, cx≈200) ════════ -->
  <rect x="133" y="35" width="134" height="237" rx="0" fill="#E0F7F5" opacity="0.5"/>
  <text x="200" y="55" fill="#2EC4B6" font-size="12" font-weight="bold" text-anchor="middle">Liquid</text>

  <!-- Loose cluster of teal dots — irregular arrangement -->
  <circle cx="175" cy="108" r="11" fill="#2EC4B6"/>
  <circle cx="200" cy="100" r="11" fill="#2EC4B6"/>
  <circle cx="224" cy="110" r="11" fill="#2EC4B6"/>
  <circle cx="182" cy="132" r="11" fill="#2EC4B6"/>
  <circle cx="210" cy="128" r="11" fill="#2EC4B6"/>
  <circle cx="170" cy="154" r="11" fill="#2EC4B6"/>
  <circle cx="200" cy="150" r="11" fill="#2EC4B6"/>
  <circle cx="226" cy="148" r="11" fill="#2EC4B6"/>
  <!-- Flow arrow -->
  <path d="M165 165 Q185 180 205 165 Q225 180 240 165" fill="none" stroke="#1A936F" stroke-width="2" stroke-dasharray="4,3"/>

  <text x="200" y="192" fill="#2EC4B6" font-size="10" font-weight="bold" text-anchor="middle">Flows freely</text>
  <text x="200" y="207" fill="#555" font-size="9" text-anchor="middle">Takes container</text>
  <text x="200" y="220" fill="#555" font-size="9" text-anchor="middle">shape</text>

  <!-- ════════ GAS (right panel, cx≈334) ════════ -->
  <rect x="267" y="35" width="131" height="237" rx="8" fill="#FFF3E8" opacity="0.5"/>
  <text x="334" y="55" fill="#FF6B35" font-size="12" font-weight="bold" text-anchor="middle">Gas</text>

  <!-- Scattered dots with motion trails -->
  <circle cx="295" cy="90" r="9" fill="#FF6B35"/>
  <line x1="295" y1="90" x2="288" y2="97" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>

  <circle cx="358" cy="100" r="9" fill="#FF6B35"/>
  <line x1="358" y1="100" x2="365" y2="93" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>

  <circle cx="310" cy="140" r="9" fill="#FF6B35"/>
  <line x1="310" y1="140" x2="303" y2="133" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>

  <circle cx="370" cy="135" r="9" fill="#FF6B35"/>
  <line x1="370" y1="135" x2="377" y2="142" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>

  <circle cx="290" cy="165" r="9" fill="#FF6B35"/>
  <line x1="290" y1="165" x2="282" y2="158" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>

  <circle cx="350" cy="168" r="9" fill="#FF6B35"/>
  <line x1="350" y1="168" x2="358" y2="175" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>

  <circle cx="325" cy="118" r="9" fill="#FF6B35"/>
  <line x1="325" y1="118" x2="332" y2="111" stroke="#FF6B35" stroke-width="1.5" opacity="0.4"/>

  <text x="334" y="192" fill="#FF6B35" font-size="10" font-weight="bold" text-anchor="middle">Spreads out</text>
  <text x="334" y="207" fill="#555" font-size="9" text-anchor="middle">Fills any</text>
  <text x="334" y="220" fill="#555" font-size="9" text-anchor="middle">container</text>

  <!-- Bottom heat arrows showing transitions -->
  <text x="200" y="252" fill="#1A1A2E" font-size="9" text-anchor="middle" font-weight="bold">Heat →  Melting  →  Evaporation</text>
  <text x="200" y="266" fill="#1A1A2E" font-size="9" text-anchor="middle">← Freezing  ←  Condensation  ← Cool</text>
</svg>
