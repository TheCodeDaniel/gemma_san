<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" font-family="Arial,sans-serif">
  <defs>
    <marker id="ce" markerWidth="7" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <polygon points="0 0,7 2.5,0 5" fill="#2EC4B6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="400" height="300" fill="#0A1628"/>

  <!-- Title -->
  <text x="200" y="24" fill="white" font-size="13" font-weight="bold" text-anchor="middle">Electricity Circuit</text>

  <!-- ── Wire rectangle: corners at (70,55) (330,55) (330,220) (70,220) ── -->
  <!-- Top wire -->
  <line x1="100" y1="55" x2="260" y2="55" stroke="#2EC4B6" stroke-width="3"/>
  <!-- Right wire -->
  <line x1="330" y1="80" x2="330" y2="195" stroke="#2EC4B6" stroke-width="3"/>
  <!-- Bottom wire -->
  <line x1="150" y1="220" x2="330" y2="220" stroke="#2EC4B6" stroke-width="3"/>
  <!-- Left wire -->
  <line x1="70" y1="80" x2="70" y2="195" stroke="#2EC4B6" stroke-width="3"/>

  <!-- ── BATTERY (bottom-left corner) ── -->
  <!-- Positive plate -->
  <rect x="70" y="193" width="40" height="28" rx="3" fill="#FFBF46"/>
  <!-- Negative plate -->
  <rect x="110" y="196" width="40" height="22" rx="3" fill="#9E9E9E"/>
  <!-- + label -->
  <text x="90" y="211" fill="#1A1A2E" font-size="13" font-weight="bold" text-anchor="middle">+</text>
  <!-- − label -->
  <text x="130" y="211" fill="white" font-size="13" font-weight="bold" text-anchor="middle">−</text>
  <!-- Battery outline -->
  <rect x="69" y="192" width="82" height="30" rx="3" fill="none" stroke="#FFBF46" stroke-width="1.5"/>
  <text x="110" y="242" fill="#FFBF46" font-size="10" font-weight="bold" text-anchor="middle">Battery</text>

  <!-- ── BULB (top-center) ── -->
  <!-- Glow aura -->
  <circle cx="195" cy="55" r="28" fill="#FFBF46" opacity="0.15"/>
  <circle cx="195" cy="55" r="20" fill="#FFBF46" opacity="0.2"/>
  <!-- Bulb body -->
  <circle cx="195" cy="52" r="18" fill="#FFBF46" opacity="0.9"/>
  <!-- Filament X -->
  <line x1="187" y1="44" x2="203" y2="60" stroke="#FF6B35" stroke-width="2"/>
  <line x1="203" y1="44" x2="187" y2="60" stroke="#FF6B35" stroke-width="2"/>
  <!-- Bulb base -->
  <rect x="189" y="67" width="12" height="10" rx="2" fill="#9E9E9E"/>
  <!-- Wires from bulb to top wire -->
  <line x1="192" y1="34" x2="192" y2="55" stroke="#2EC4B6" stroke-width="3"/>
  <line x1="198" y1="34" x2="198" y2="55" stroke="#2EC4B6" stroke-width="3"/>
  <text x="195" y="92" fill="#FFBF46" font-size="10" font-weight="bold" text-anchor="middle">Light Bulb</text>

  <!-- ── SWITCH (right side) ── -->
  <!-- Gap in right wire at y=140 -->
  <rect x="320" y="115" width="20" height="55" rx="0" fill="#0A1628"/>
  <!-- Switch contacts -->
  <circle cx="330" cy="120" r="4" fill="#9E9E9E"/>
  <circle cx="330" cy="170" r="4" fill="#9E9E9E"/>
  <!-- Open lever (angled) -->
  <line x1="330" y1="120" x2="348" y2="145" stroke="#FF6B35" stroke-width="3" stroke-linecap="round"/>
  <text x="360" y="148" fill="#FF6B35" font-size="10" font-weight="bold">Switch</text>
  <text x="358" y="160" fill="#9CB4CC" font-size="9">(open)</text>

  <!-- ── Current flow arrows ── -->
  <!-- Top: left → right -->
  <line x1="130" y1="48" x2="170" y2="48" stroke="#2EC4B6" stroke-width="1.5" marker-end="url(#ce)" opacity="0.7"/>
  <line x1="220" y1="48" x2="260" y2="48" stroke="#2EC4B6" stroke-width="1.5" marker-end="url(#ce)" opacity="0.7"/>
  <!-- Right: top → bottom -->
  <line x1="337" y1="95" x2="337" y2="130" stroke="#2EC4B6" stroke-width="1.5" marker-end="url(#ce)" opacity="0.7"/>
  <!-- Bottom: right → left -->
  <line x1="290" y1="227" x2="250" y2="227" stroke="#2EC4B6" stroke-width="1.5" marker-end="url(#ce)" opacity="0.7"/>
  <line x1="210" y1="227" x2="170" y2="227" stroke="#2EC4B6" stroke-width="1.5" marker-end="url(#ce)" opacity="0.7"/>
  <!-- Left: bottom → top -->
  <line x1="63" y1="180" x2="63" y2="140" stroke="#2EC4B6" stroke-width="1.5" marker-end="url(#ce)" opacity="0.7"/>

  <!-- Electrons label -->
  <text x="200" y="275" fill="#2EC4B6" font-size="10" font-weight="bold" text-anchor="middle">Electrons flow from − to + through the wire</text>

  <!-- Corner connectors -->
  <circle cx="70" cy="55" r="5" fill="#2EC4B6"/>
  <circle cx="330" cy="55" r="5" fill="#2EC4B6"/>
  <circle cx="330" cy="220" r="5" fill="#2EC4B6"/>
  <circle cx="70" cy="220" r="5" fill="#2EC4B6"/>
</svg>
