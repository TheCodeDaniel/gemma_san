<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 420" font-family="Arial,sans-serif">
  <!-- Background -->
  <rect width="300" height="420" fill="#FEFEF0"/>
  <!-- Title -->
  <text x="150" y="18" fill="#1A1A2E" font-size="12" font-weight="bold" text-anchor="middle">Digestive System</text>

  <!-- ── MOUTH ── -->
  <ellipse cx="150" cy="38" rx="42" ry="18" fill="#FFBF46"/>
  <ellipse cx="150" cy="38" rx="33" ry="11" fill="#E63946" opacity="0.5"/>
  <text x="150" y="42" fill="#1A1A2E" font-size="9" font-weight="bold" text-anchor="middle">Mouth</text>

  <!-- ── ESOPHAGUS ── -->
  <rect x="144" y="55" width="12" height="55" rx="6" fill="#9CB4CC"/>
  <text x="165" y="80" fill="#9CB4CC" font-size="9" font-weight="bold">Esophagus</text>

  <!-- ── STOMACH (J-shaped, left of center) ── -->
  <path d="M152 110
    C170 110 188 120 188 140
    C188 165 175 180 155 182
    C130 184 100 170 95 150
    C90 130 98 112 118 110 Z"
    fill="#FF8C42"/>
  <!-- Stomach folds (rugae) -->
  <path d="M112 128 C125 125 145 125 158 130" fill="none" stroke="#E07030" stroke-width="1.5" opacity="0.5"/>
  <path d="M108 142 C122 139 144 139 160 145" fill="none" stroke="#E07030" stroke-width="1.5" opacity="0.5"/>
  <path d="M108 156 C120 153 140 153 158 158" fill="none" stroke="#E07030" stroke-width="1.5" opacity="0.5"/>
  <text x="88" y="152" fill="#FF6B35" font-size="10" font-weight="bold" text-anchor="end">Stomach</text>

  <!-- Pylorus (exit of stomach) -->
  <rect x="148" y="178" width="12" height="22" rx="5" fill="#FF8C42"/>

  <!-- ── SMALL INTESTINE (coiled, center) ── -->
  <!-- Outer frame approximation using nested zigzag rectangles -->
  <!-- Row 1: left to right -->
  <rect x="68" y="200" width="165" height="18" rx="8" fill="#FFBF46"/>
  <!-- Row 2: right loop down -->
  <rect x="215" y="218" width="18" height="30" rx="8" fill="#FFBF46"/>
  <!-- Row 3: right to left -->
  <rect x="68" y="248" width="165" height="18" rx="8" fill="#FFBF46"/>
  <!-- Row 4: left loop down -->
  <rect x="68" y="266" width="18" height="30" rx="8" fill="#FFBF46"/>
  <!-- Row 5: left to right -->
  <rect x="68" y="296" width="165" height="18" rx="8" fill="#FFBF46"/>
  <!-- Row 6: right loop down -->
  <rect x="215" y="314" width="18" height="18" rx="8" fill="#FFBF46"/>
  <!-- Connect -->
  <rect x="68" y="330" width="80" height="15" rx="7" fill="#FFBF46"/>
  <text x="68" y="362" fill="#E0A020" font-size="9" font-weight="bold">Small intestine</text>
  <text x="68" y="374" fill="#888" font-size="8">(digests &amp; absorbs)</text>

  <!-- ── LARGE INTESTINE (outer frame around small intestine) ── -->
  <!-- Ascending colon (right side) -->
  <rect x="238" y="198" width="20" height="138" rx="9" fill="#FF6B35" opacity="0.9"/>
  <!-- Transverse colon (top) -->
  <rect x="55" y="190" width="203" height="20" rx="9" fill="#FF6B35" opacity="0.9"/>
  <!-- Descending colon (left side) -->
  <rect x="43" y="198" width="20" height="138" rx="9" fill="#FF6B35" opacity="0.9"/>
  <!-- Sigmoid colon (bottom-left curve to center) -->
  <path d="M53 335 C38 352 42 372 65 375 C90 378 115 372 125 360"
        fill="none" stroke="#FF6B35" stroke-width="20" stroke-linecap="round" opacity="0.9"/>
  <text x="258" y="278" fill="#FF6B35" font-size="8" font-weight="bold" text-anchor="start">Large</text>
  <text x="258" y="290" fill="#FF6B35" font-size="8" font-weight="bold" text-anchor="start">intestine</text>

  <!-- ── RECTUM ── -->
  <rect x="118" y="355" width="20" height="50" rx="8" fill="#E63946"/>
  <text x="145" y="390" fill="#E63946" font-size="9" font-weight="bold">Rectum</text>

  <!-- Flow arrows -->
  <defs>
    <marker id="dg" markerWidth="6" markerHeight="5" refX="5" refY="2.5" orient="auto">
      <polygon points="0 0,6 2.5,0 5" fill="#555"/>
    </marker>
  </defs>
  <line x1="150" y1="56" x2="150" y2="59" stroke="#555" stroke-width="1" marker-end="url(#dg)"/>
  <line x1="150" y1="108" x2="150" y2="111" stroke="#555" stroke-width="1" marker-end="url(#dg)"/>
  <line x1="150" y1="199" x2="150" y2="202" stroke="#555" stroke-width="1" marker-end="url(#dg)"/>
</svg>
