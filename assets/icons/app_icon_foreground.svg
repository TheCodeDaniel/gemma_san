<circle cx="220" cy="170" r="22" fill="#FBF6EC" stroke="#3A2515" stroke-width="2.5" style="fill:rgb(251, 246, 236);stroke:rgb(58, 37, 21);color:rgb(255, 255, 255);stroke-width:2.5px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto"/>

